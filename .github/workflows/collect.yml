name: ReusableCollectSkills

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '24'
      pnpm_version:
        required: false
        type: string
        default: '10'
      python_version:
        required: false
        type: string
        default: '3.13'
    secrets:
      GH_TOKEN:
        required: false

jobs:
  collect:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      collect_id: ${{ steps.collect.outputs.collect_id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install collector dependencies
        run: pnpm install --dir tools/harbor/collector

      - name: Collect skills from org repositories
        id: collect
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ORG: ${{ vars.GH_ORG || github.repository_owner }}
        run: pnpm --dir tools/harbor/collector exec harbor collect --project-root "$GITHUB_WORKSPACE"

      - name: Upload collect data artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: harbor-data-collected
          path: data
          retention-days: 1

  post_collect:
    runs-on: ubuntu-24.04
    needs: collect
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect skill-scanner runtime requirement
        id: detect_skill_scanner
        run: |
          if yq -e 'any(.post_collect.plugins[]?; .id == "builtin.audit-skill-scanner")' config/harbor.yaml > /dev/null 2>&1; then
            echo "install_skill_scanner_runtime=true" >> "$GITHUB_OUTPUT"
          else
            echo "install_skill_scanner_runtime=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: ${{ inputs.pnpm_version }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: ${{ steps.detect_skill_scanner.outputs.install_skill_scanner_runtime == 'true' }}
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install skill-scanner
        if: ${{ steps.detect_skill_scanner.outputs.install_skill_scanner_runtime == 'true' }}
        run: pip install cisco-ai-skill-scanner

      - name: Install post-collect dependencies
        run: pnpm install --dir tools/harbor/post-collect

      - name: Install user-defined plugin dependencies
        shell: bash
        run: |
          shopt -s nullglob
          plugin_package_found=false
          for package_json in plugins/*/package.json; do
            plugin_dir="$(dirname "$package_json")"
            plugin_package_found=true
            echo "Installing plugin dependencies in $plugin_dir"
            pnpm install --dir "$plugin_dir"
          done
          if [ "$plugin_package_found" = false ]; then
            echo "No user-defined plugin package.json files found"
          fi

      - name: Restore collected data artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: harbor-data-collected
          path: .harbor-artifacts/collected

      - name: Restore collected data directory
        run: |
          rm -rf data
          if [ -d ".harbor-artifacts/collected/data" ]; then
            mv .harbor-artifacts/collected/data ./data
          else
            mkdir -p data
            cp -R .harbor-artifacts/collected/. ./data/
          fi

      - name: Run post-collect plugins
        env:
          GH_ORG: ${{ vars.GH_ORG || github.repository_owner }}
        run: pnpm --dir tools/harbor/post-collect exec harbor post-collect --project-root "$GITHUB_WORKSPACE" --collect-id "${{ needs.collect.outputs.collect_id }}"

      - name: Upload final data artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: harbor-data-final
          path: data
          retention-days: 1

  commit:
    runs-on: ubuntu-24.04
    needs: post_collect
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore final data artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: harbor-data-final
          path: .harbor-artifacts/final

      - name: Restore final data directory
        run: |
          rm -rf data
          if [ -d ".harbor-artifacts/final/data" ]; then
            mv .harbor-artifacts/final/data ./data
          else
            mkdir -p data
            cp -R .harbor-artifacts/final/. ./data/
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update skill catalog data"
            git push
          fi
